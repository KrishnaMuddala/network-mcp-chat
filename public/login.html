<!DOCTYPE html>
<html>
<head>
  <title>NetOps Chat - Login</title>
  <style>
    body { font-family: system-ui; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a2e; }
    form { background: #fff; padding: 2rem; border-radius: 8px; width: 300px; }
    input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; box-sizing: border-box; }
    button { width: 100%; padding: 0.6rem; background: #0f3460; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .error { color: #e94560; font-size: 0.9rem; }
  </style>
</head>
<body>
  <form method="POST" action="/login">
    <h2>NetOps Chat</h2>
    <input name="username" placeholder="Username" required autofocus>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Log in</button>
    <p class="error" id="err"></p>
  </form>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('err').textContent = 'Invalid username or password';
    }
  </script>
</body>
</html>
