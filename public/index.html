<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MCP Chat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'dark' });</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    #sidebar {
      width: 200px;
      min-width: 200px;
      background: #252525;
      border-right: 1px solid #333;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }

    #sidebar-title {
      font-size: 0.8em;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding-bottom: 4px;
      border-bottom: 1px solid #333;
    }

    .doc-item {
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85em;
      color: #ccc;
    }
    .doc-item:hover { background: #333; color: #fff; }

    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Model selector bar ── */
    #model-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: #252525;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    #model-bar label {
      font-size: 0.75em;
      color: #888;
      white-space: nowrap;
    }

    #model-select {
      background: #1e1e1e;
      color: #d4d4d4;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 0.8em;
      cursor: pointer;
      outline: none;
      flex: 1;
      max-width: 260px;
      transition: border-color 0.2s;
    }
    #model-select:focus,
    #model-select:hover { border-color: #0e639c; }
    #model-select option { background: #1e1e1e; }

    #model-switched {
      font-size: 0.72em;
      color: #4ec94e;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    #model-switched.show { opacity: 1; }

    #reload-models {
      background: none;
      border: 1px solid #444;
      color: #888;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 0.75em;
      cursor: pointer;
      font-family: monospace;
      transition: all 0.2s;
    }
    #reload-models:hover { border-color: #0e639c; color: #d4d4d4; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
      scroll-behavior: smooth;
    }

    #messages-anchor { flex-shrink: 0; height: 0; }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user      { background: #0e639c; align-self: flex-end; }
    .assistant { background: #2d2d2d; align-self: flex-start; }

    .tool-call {
      background: #1a3a1a;
      border: 1px solid #3a7a3a;
      align-self: flex-start;
      font-size: 0.85em;
      color: #88cc88;
    }

    .tool-result {
      background: #1a2a3a;
      border: 1px solid #3a5a7a;
      align-self: flex-start;
      font-size: 0.85em;
      color: #88aacc;
    }

    .mermaid-msg {
      background: transparent;
      align-self: flex-start;
      padding: 16px;
      max-width: 95%;
      width: 95%;
      overflow-x: auto;
    }

    .mermaid-msg svg {
      width: 100% !important;
      height: auto !important;
      min-height: 300px;
    }

    /* model badge on assistant messages */
    .model-badge {
      display: inline-block;
      font-size: 0.65em;
      background: #333;
      color: #888;
      border-radius: 3px;
      padding: 1px 5px;
      margin-bottom: 4px;
    }

    #input-row {
      display: flex;
      padding: 16px;
      gap: 10px;
      border-top: 1px solid #333;
      align-items: center;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: #2d2d2d;
      border: 1px solid #444;
      color: #d4d4d4;
      padding: 10px 14px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 14px;
      outline: none;
    }
    #input:focus { border-color: #0e639c; }

    #send {
      background: #0e639c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-family: monospace;
      white-space: nowrap;
    }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }
    .typing { opacity: 0.5; font-style: italic; }
  </style>
</head>
<body>

  <div id="sidebar">
    <div id="sidebar-title">📄 Documents</div>
    <div id="doc-list"></div>
  </div>

  <div id="chat-area">

    <!-- ── Model selector bar ── -->
    <div id="model-bar">
      <label>🤖 Model</label>
      <select id="model-select" onchange="switchModel(this.value)">
        <option value="">Loading...</option>
      </select>
      <button id="reload-models" onclick="loadModels()" title="Refresh model list">↺</button>
      <span id="model-switched">✓ switched</span>
    </div>

    <div id="messages">
      <div id="messages-anchor"></div>
    </div>

    <div id="input-row">
      <input id="input" placeholder="Type a message..." autofocus />
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const input      = document.getElementById("input");
    const sendBtn    = document.getElementById("send");
    const sessionId  = Math.random().toString(36).slice(2);
    let   activeModel = "";

    function scrollToBottomIfNeeded() {
      const threshold = 100;
      const isNearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < threshold;
      if (isNearBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Model selector ────────────────────────────────────────────────
    async function loadModels() {
      const select = document.getElementById("model-select");
      select.innerHTML = '<option value="">Loading...</option>';
      try {
        const res  = await fetch("/models");
        const data = await res.json();
        select.innerHTML = "";
        if (!data.models || data.models.length === 0) {
          select.innerHTML = '<option value="">No models found</option>';
          return;
        }
        for (const m of data.models) {
          const opt = document.createElement("option");
          opt.value = m;
          opt.textContent = m;
          if (m === data.current) opt.selected = true;
          select.appendChild(opt);
        }
        activeModel = data.current;
      } catch (err) {
        select.innerHTML = '<option value="">Error loading models</option>';
        console.warn("Could not load models:", err);
      }
    }

    async function switchModel(model) {
      if (!model) return;
      try {
        await fetch("/model", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model }),
        });
        activeModel = model;
        const badge = document.getElementById("model-switched");
        badge.classList.add("show");
        setTimeout(() => badge.classList.remove("show"), 2000);
      } catch (err) {
        console.warn("Could not switch model:", err);
      }
    }

    loadModels();

    // ── Sidebar ───────────────────────────────────────────────────────
    async function loadDocs() {
      try {
        const res       = await fetch("/resources");
        const resources = await res.json();
        const list      = document.getElementById("doc-list");
        for (const r of resources) {
          const div     = document.createElement("div");
          div.className = "doc-item";
          const id      = r.uri.replace("docs://documents/", "");
          div.textContent = id;
          div.onclick   = () => { input.value = `tell me about @${id}`; input.focus(); };
          list.appendChild(div);
        }
      } catch (e) {
        console.warn("Could not load docs", e);
      }
    }
    loadDocs();

    // ── Mermaid helpers ───────────────────────────────────────────────
    function isMermaid(text) {
      if (!text) return false;
      return /^(flowchart|graph |sequenceDiagram|classDiagram|stateDiagram|erDiagram|journey|gantt|pie|timeline|mindmap|xychart|sankey-beta|---\ntitle)/.test(text.trim());
    }

    async function renderMermaid(container, code) {
      try {
        container.innerHTML = "";
        container.className = "msg mermaid-msg";
        const id = "mermaid-" + Date.now() + "-" + Math.random().toString(36).slice(2);
        const { svg } = await mermaid.render(id, code.trim());
        container.innerHTML = svg;
      } catch (e) {
        container.className = "msg assistant";
        container.textContent = code;
        console.warn("Mermaid render failed:", e);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Message helpers ───────────────────────────────────────────────
    function addMessage(role, text) {
      const div     = document.createElement("div");
      div.className = `msg ${role}`;
      messagesEl.appendChild(div);
      if (text) {
        if (isMermaid(text)) {
          renderMermaid(div, text);
        } else {
          div.textContent = text;
        }
      }
      scrollToBottomIfNeeded();
      return div;
    }

    // ── Send message ──────────────────────────────────────────────────
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      input.value      = "";
      sendBtn.disabled = true;
      addMessage("user", text);

      const assistantDiv = addMessage("assistant", "");
      assistantDiv.classList.add("typing");
      messagesEl.scrollTop = messagesEl.scrollHeight;

      const commandMatch = text.match(/^\/(\w+)\s+(.+)$/);
      const atMatch      = text.match(/@([\w.\-]+)/);

      let fetchUrl  = "/chat";
      let fetchBody = { message: text, sessionId };

      if (commandMatch) {
        fetchUrl  = "/command";
        fetchBody = { command: commandMatch[1], docId: commandMatch[2], sessionId };
      } else if (atMatch) {
        const docId = atMatch[1];
        try {
          const r        = await fetch(`/resource?uri=docs://documents/${docId}`);
          const contents = await r.json();
          const docText  = contents[0]?.text ?? "";
          fetchBody      = { message: text + `\n\n--- ${docId} ---\n${docText}`, sessionId };
        } catch (e) {
          console.warn("Could not load resource", e);
        }
      }

      const res = await fetch(fetchUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(fetchBody),
      });

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer    = "";
      let assistantFullText = "";
      let usedModel = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = JSON.parse(line.slice(6));

          if (data.type === "model") {
            // Server tells us which model was used — add badge
            usedModel = data.model;
            const badge = document.createElement("div");
            badge.className = "model-badge";
            badge.textContent = data.model;
            assistantDiv.prepend(badge);

          } else if (data.type === "text") {
            assistantDiv.classList.remove("typing");
            assistantFullText += data.content;
            // Keep badge if present, update text
            const badge = assistantDiv.querySelector(".model-badge");
            if (badge) {
              assistantDiv.textContent = assistantFullText;
              assistantDiv.prepend(badge);
            } else {
              assistantDiv.textContent = assistantFullText;
            }

          } else if (data.type === "tool_call") {
            addMessage("tool-call", `🔧 ${data.name}\n${JSON.stringify(data.args, null, 2)}`);

          } else if (data.type === "tool_result") {
            const resultText = Array.isArray(data.result)
              ? data.result.join("\n")
              : String(data.result);
            const div = document.createElement("div");
            div.className = "msg tool-result";
            messagesEl.appendChild(div);
            if (isMermaid(resultText)) {
              renderMermaid(div, resultText);
            } else {
              div.textContent = `✅ ${data.name}\n${JSON.stringify(data.result, null, 2)}`;
            }

          } else if (data.type === "done") {
            assistantDiv.classList.remove("typing");
            if (isMermaid(assistantFullText)) {
              renderMermaid(assistantDiv, assistantFullText);
            }

          } else if (data.type === "error") {
            assistantDiv.classList.remove("typing");
            assistantDiv.textContent = `Error: ${data.message}`;
          }
        }

        scrollToBottomIfNeeded();
      }

      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
  </script>
</body>
</html>
